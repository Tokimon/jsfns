name: New Version

on:
  push:
    tags:
      - "@jsfns/core@*"
      - "@jsfns/web@*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm

      - name: Run validation
        run: pnpm validate

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm
        with:
          fetch-depth: 0

      - name: Determine package and release
        run: |
          echo "Tag: $GITHUB_REF_NAME"
          if [[ "$GITHUB_REF_NAME" == "@jsfns/core@"* ]]; then
            echo "Releasing @jsfns/core"
            pnpm --filter @jsfns/core release --provenance
          elif [[ "$GITHUB_REF_NAME" == "@jsfns/web@"* ]]; then
            echo "Releasing @jsfns/web"
            pnpm --filter @jsfns/core build
            pnpm --filter @jsfns/web release --provenance
          else
            echo "Unknown tag format: $GITHUB_REF_NAME"
            exit 1
          fi

  trigger-docs:
    needs: release
    uses: ./.github/workflows/trigger-docs.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
