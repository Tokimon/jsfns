name: New Version

on:
  push:
    tags:
      - "@jsfns/core@*"
      - "@jsfns/web@*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm

      - name: Run validation
        run: pnpm validate

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm
        with:
          fetch-depth: 0

      - name: Determine package and release
        run: |
          echo "Tag: $GITHUB_REF_NAME"
          if [[ "$GITHUB_REF_NAME" == "@jsfns/core@"* ]]; then
            echo "Releasing @jsfns/core"
            pnpm --filter @jsfns/core release --provenance
          elif [[ "$GITHUB_REF_NAME" == "@jsfns/web@"* ]]; then
            echo "Releasing @jsfns/web"
            pnpm --filter @jsfns/web release --provenance
          else
            echo "Unknown tag format: $GITHUB_REF_NAME"
            exit 1
          fi

  trigger-docs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow in jsfns-docs
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: Tokimon/jsfns-docs
          event-type: new-version
          client-payload: >-
            {
              "tag": "${{ github.ref_name }}",
              "source_repo": "${{ github.repository }}"
            }
