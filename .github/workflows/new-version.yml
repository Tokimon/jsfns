name: New Version

on:
  push:
    tags:
      - "@jsfns/core@*"
      - "@jsfns/web@*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm

      - name: Run validation
        run: pnpm validate

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm
        with:
          fetch-depth: 0

      - name: Determine package and release
        run: |
          echo "Tag: $GITHUB_REF_NAME"
          if [[ "$GITHUB_REF_NAME" == "@jsfns/core@"* ]]; then
            echo "Releasing @jsfns/core"
            pnpm --filter @jsfns/core release --provenance
          elif [[ "$GITHUB_REF_NAME" == "@jsfns/web@"* ]]; then
            echo "Releasing @jsfns/web"
            pnpm --filter @jsfns/web release --provenance
          else
            echo "Unknown tag format: $GITHUB_REF_NAME"
            exit 1
          fi

  trigger-docs:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm to expose new version
        run: |
          PKG="${GITHUB_REF_NAME%@*}"
          VER="${GITHUB_REF_NAME##*@}"
          echo "Waiting 30s before polling npm for $PKG@$VER..."
          sleep 30
          for i in {1..60}; do
            if npm view "$PKG@$VER" version >/dev/null 2>&1; then
              echo "✓ $PKG@$VER available on npm"
              exit 0
            fi
            echo "waiting for $PKG@$VER... ($i/60)"
            sleep 5
          done
          echo "::error::$PKG@$VER not visible on npm after 5m30s"
          exit 1

      - name: Trigger workflow in jsfns-docs
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: Tokimon/jsfns-docs
          event-type: new-version
          client-payload: >-
            {
              "tag": "${{ github.ref_name }}",
              "source_repo": "${{ github.repository }}"
            }
