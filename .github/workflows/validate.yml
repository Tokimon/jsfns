name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, web]
        check: [lint, typecheck, docs, test]
        include:
          - check: docs
            command: typedoc:validate
    name: ${{ matrix.package }} / ${{ matrix.check }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/setup-node-pnpm

      - name: Run ${{ matrix.check }}
        run: pnpm --filter @jsfns/${{ matrix.package }} ${{ matrix.command || matrix.check }}

  validate:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
