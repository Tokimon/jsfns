name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [core, web]
        check: [lint, types, docs, test]
        include:
          - check: lint
            command: pnpm lint
          - check: types
            command: pnpm types
          - check: docs
            command: pnpm typedoc:validate
          - check: test
            command: pnpm test
    name: ${{ matrix.package }} / ${{ matrix.check }}
    steps:
      - uses: ./.github/setup-node-pnpm

      - name: Run ${{ matrix.check }}
        run: pnpm --filter @jsfns/${{ matrix.package }} ${{ matrix.command }}
